name: dancekatta
description: "DanceKatta app"
publish_to: 'none'

version: 1.0.5

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^12.0.1
  shared_preferences: ^2.0.15
  url_launcher: ^6.2.5
  cupertino_icons: ^1.0.8
  pdf: ^3.10.4
  printing: ^5.11.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.0 
  cloud_firestore: ^5.4.2
  google_sign_in: ^6.2.1
  flutter_plugin_android_lifecycle: ^2.0.29
  dropdown_button2: ^2.3.9
  package_info_plus: ^8.0.0  # ✅ ADD THIS LINE HERE





  # ✅ Added packages for UI
  intl: ^0.19.0
  image_picker: ^1.1.2
  google_fonts: ^6.3.0
  flutter_svg: ^2.0.7
  flutter_rating_bar: ^4.0.0
  multi_select_flutter: ^4.1.3

  #Added packages for database and networking
  mongo_dart: ^0.10.0
  http: ^1.2.0
  razorpay_flutter: ^1.3.7



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  bson: 5.0.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/dance_logo.png
    - assets/icons/google.png
    - assets/images/styles/
    - assets/icons/contact_us.png
    - assets/images/logo.png
    - assets/fonts/Roboto-VariableFont_wdth,wght.ttf
    - assets/fonts/Roboto-Italic-VariableFont_wdth,wght.ttf


flutter_icons:
    android: true
    ios: true
    image_path: "assets/images/logo.png"